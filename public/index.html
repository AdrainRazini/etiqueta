<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>(ADN) Etiquetar</title>
<link rel="shortcut icon" href="image/fa_ADN_Loading_Mod.png" type="image/x-icon">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="css/core-root.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/pages_screen.css">
<link rel="stylesheet" href="css/layout_pdf.css" media="print">
</head>

<!--  Html Modular com app.js e api.js  -->

<body>

<!-- LOADING -->
<div id="loading-screen">

    <img 
        src="image/fa_ADN_Loading_Mod.png"
        class="logo"
        id="loading-image"
    >

    <div class="slider">
        <div class="progress" id="loading-progress"></div>
    </div>

    <p class="loading-text" id="loading-text">
        <i class="fa-solid fa-microchip"></i>
        Inicializando sistema...
    </p>

</div>

<!-- Informação do Html como um container no centro modular para as pessoas (sera usado outro js para dados dinamicos) --> 
<div class="conteudos-card" id="container_info_data" >
<div class="card">
    <img class="image-card" src="image/Servidor.png" alt="">
</div>
</div>

<!-- INTERFACE De Ferramentas -->
<div class="toolbar" id="toolbar-tab">

    <div class="tool_info_bar"></div>

    <button data-action="server" data-label="Servidor">
        <i class="fa-solid fa-server"></i>
    </button>

    <button data-action="chat" data-label="Chat Bot">
        <i class="fa-solid fa-robot"></i>
    </button>

    <button data-action="config" data-label="Configurações">
        <i class="fa-solid fa-gear"></i>
    </button>

    <button data-action="info" data-label="Informações">
        <i class="fa-solid fa-circle-info"></i>
    </button>

    <button data-action="tag" data-label="Criar Etiqueta">
        <i class="fa-solid fa-tag"></i>
    </button>

</div>

<!-- INTERFACE Preenchimento de Dados -->
<div id="modal-overlay" class="modal-overlay">

    <div class="modal-window">

        <div class="modal-header">

            <h2 id="modal-title" >
                <i class="fa-solid fa-circle-info"></i>
                Informações
            </h2>

            <button class="modal-close" id="modal-close">
                <i class="fa-solid fa-xmark"></i>
            </button>

        </div>

        <div class="modal-body" id="modal-body">

            <p id="modal-text">
                Este é um exemplo de modal de informação para o sistema ADN.
            </p>

            <img src="image/fa_ADN_Loading_Mod.png" class="modal-image" id="modal-image">

            <div id="modal-inputs"></div>

            <p id="modal-text-sub">
                Este é um exemplo de modal do sistema ADN. (Em Teste)
            </p>

        </div>

        <div class="modal-footer">

            <button class="btn cancel" id="btn_cancel">Cancelar</button>
            <button class="btn confirm" id="btn_confirm">Confirmar</button>

        </div>

    </div>

</div>

<!-- area de Impressão (Evita Printar tela) -->
<div class="print-area" id="print-area"></div>

<!-- Conexão De app.js -->
 <script type="module" src="js/app.js"></script>
 <!-- Conexão De api.js -->
 <script type="module" src="js/api.js"></script>

 <!-- Extra de Cidades BR ES UF -->
  <script src="js/cidades-brasil.js"></script>

  <!-- Memory Ram -->
  <script type="module" src="js/cache.js"></script>

</body>
</html>
